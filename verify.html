<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Certificate - IOTIFY</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<canvas id="bg"></canvas>

<!-- NAVBAR -->
<nav>
    <h1>IOTIFY</h1>
    <button onclick="goHome()">Home</button>
</nav>

<!-- VERIFY -->
<section class="verify-section">

    <div class="verify-container">

        <button class="close-btn" onclick="goHome()">✖</button>

        <h1 class="verify-title">Verify Certificate</h1>

        <!-- INPUTS -->
        <div class="form-box">
            <input type="text" id="verifyName" placeholder="Enter Name">
            <input type="text" id="verifyId" placeholder="Enter ID">
            <button class="verify-btn" onclick="verifyCertificate()">Verify</button>
        </div>

        <div class="or">OR</div>

        <!-- QR -->
        <button class="scan-btn" onclick="scanQR()">📷 Scan QR</button>

        <div id="qr-reader"></div>

        <button class="switch-btn" onclick="switchCamera()">🔄 Switch Camera</button>

        <!-- RESULT -->
        <div id="verifyResult"></div>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
