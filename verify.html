<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Certificate - IOTIFY</title>

<!-- CSS -->
<link rel="stylesheet" href="style.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<!-- QR Scanner Library -->
<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<!-- BACKGROUND -->
<canvas id="bg"></canvas>

<!-- NAVBAR -->
<nav>
    <h1>IOTIFY</h1>
    <button onclick="goHome()">Home</button>
</nav>

<!-- VERIFY SECTION -->
<section class="section">

    <h2 class="verify-title">Verify Certificate</h2>

    <div class="verify-box">

        <!-- INPUTS -->
        <input type="text" id="verifyName" placeholder="Enter Name">
        <input type="text" id="verifyId" placeholder="Enter ID">

        <!-- VERIFY BUTTON -->
        <button onclick="verifyCertificate()">Verify Now</button>

        <p class="or-text">OR</p>

        <!-- QR BUTTON -->
        <button onclick="scanQR()">📷 Scan QR</button>
        <button onclick="switchCamera()">🔄 Switch Camera</button>

        <!-- QR CAMERA -->
        <div id="qr-reader" style="display:none;"></div>

        <!-- RESULT -->
        <div id="verifyResult"></div>

    </div>

</section>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
