<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOTIFY</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>

<body>

<canvas id="bg"></canvas>

<!-- NAVBAR -->
<nav>
    <h1>IOTIFY</h1>
    <div>
        <button class="login-btn" onclick="openLogin()">Login</button>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <h1 id="typing"></h1>
    <p>Innovating with IoT & Embedded Systems</p>

    <div class="hero-buttons">
        <button onclick="goToEvents()">Explore</button>
        <button class="verify-btn" onclick="goToVerify()">Verify Certificate</button>
    </div>
</section>

<!-- DOMAINS -->
<section class="section">
    <h2>Our Domains</h2>
    <div class="cards">
        <div class="card">IoT Systems</div>
        <div class="card">Embedded Development</div>
        <div class="card">Smart Automation</div>
        <div class="card">AI + IoT</div>
    </div>
</section>

<footer>Built with Innovation</footer>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal">
    <div class="modal-content">

        <!-- CLOSE -->
        <span class="close-btn" onclick="closeLogin()">✖</span>

        <h2>Admin Login</h2>

        <!-- INPUTS -->
        <input type="text" id="adminUser" placeholder="Username">
        <input type="password" id="adminPass" placeholder="Password">

        <!-- LOGIN -->
        <button onclick="adminLogin()">Login</button>

    </div>
</div>

<script src="script.js"></script>

<script>
// 🔐 ADMIN LOGIN
function adminLogin(){
    const user = document.getElementById("adminUser").value;
    const pass = document.getElementById("adminPass").value;

    if(user === "admin" && pass === "iotify123"){
        window.location.href = "admin.html";
    }else{
        alert("Invalid credentials ❌");
    }
}
</script>

</body>
</html>
