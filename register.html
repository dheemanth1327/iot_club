<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IOTIFY Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
    background: radial-gradient(circle at top,#0f2027,#0a0a0f 60%);
    color:#fff;
}

.register-section{
    padding:100px 10%;
    display:flex;
    justify-content:center;
}

.register-container{
    width:100%;
    max-width:900px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
}

h1{text-align:center;margin-bottom:10px;}
p{text-align:center;margin-bottom:30px;color:#aaa;}

.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.full{grid-column:span 2;}

input,select{
    padding:12px;
    border-radius:10px;
    border:none;
    background:#111;
    color:#fff;
}

.member{
    margin-top:20px;
    padding:20px;
    border-radius:15px;
    background:rgba(0,247,255,0.05);
}

button{
    margin-top:30px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#00f7ff;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}

@media(max-width:768px){
    .form-grid{grid-template-columns:1fr;}
    .full{grid-column:span 1;}
}
</style>
</head>

<body>

<section class="register-section">
<div class="register-container">

<h1>Event Registration</h1>
<p>Fill your team details</p>

<form id="form">

<div class="form-grid">
<input class="full" name="teamName" placeholder="Team Name" required>

<select name="theme" required>
<option disabled selected>Select Theme</option>
<option>SUS</option>
<option>ABC</option>
<option>XYZ</option>
</select>

<select id="size" name="teamSize" required onchange="generate()">
<option disabled selected>Team Size</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
</select>
</div>

<div id="members"></div>

<button type="submit">Register</button>

</form>
</div>
</section>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzS2hbIfDbhizjsuNeWFdgjoX29NG2PQeUOm8JvurbuIVI1AzHPl_RkvGw9DIBD7KYE/exec";

function generate(){
    const size = document.getElementById("size").value;
    const container = document.getElementById("members");
    container.innerHTML="";

    for(let i=1;i<=size;i++){
        container.innerHTML += `
        <div class="member">
        <h3>${i==1?"Leader":"Member "+i}</h3>
        <div class="form-grid">
        <input name="name_${i}" placeholder="Name" required>
        <input name="usn_${i}" placeholder="USN" required>
        <input name="phone_${i}" placeholder="Phone" required>
        <input name="email_${i}" placeholder="Email" required>
        <input name="branch_${i}" placeholder="Branch" required>
        <input name="sem_${i}" placeholder="Sem" required>
        </div>
        </div>`;
    }
}

document.getElementById("form").addEventListener("submit", e=>{
    e.preventDefault();

    fetch(scriptURL,{
        method:"POST",
        body:new FormData(e.target)
    })
    .then(res=>res.text())
    .then(()=>{
        alert("✅ Registered Successfully!");
        location.reload();
    })
    .catch(err=>{
        alert("❌ Error: "+err);
    });
});
</script>

</body>
</html>
