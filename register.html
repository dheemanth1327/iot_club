<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - IOTIFY</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Standalone Modern Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: radial-gradient(circle at top, #0f2027, #0a0a0f 60%); color: white; min-height: 100vh; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; position: fixed; width: 100%; top: 0; backdrop-filter: blur(15px); z-index: 1000; }
        nav h1 { color: #00f7ff; }
        nav button { padding: 10px 20px; border: none; border-radius: 20px; background: linear-gradient(45deg, #00f7ff, #8a2be2); color: white; cursor: pointer; }
        .register-section { padding: 120px 10% 60px; display: flex; flex-direction: column; align-items: center; }
        .register-container { width: 100%; max-width: 850px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        .hero-title { font-size: 42px; font-weight: 700; text-align: center; background: linear-gradient(45deg, #00f7ff, #8a2be2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .full-width { grid-column: span 2; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: #fff; transition: 0.3s; }
        input:focus { border-color: #00f7ff; box-shadow: 0 0 15px rgba(0,247,255,0.3); outline: none; }
        .member-section { margin-top: 30px; padding: 25px; border-radius: 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 247, 255, 0.2); animation: fadeIn 0.5s ease; }
        .member-section h3 { color: #00f7ff; margin-bottom: 20px; text-shadow: 0 0 10px rgba(0, 247, 255, 0.3); }
        .submit-btn { width: 100%; margin-top: 40px; padding: 18px; border-radius: 15px; border: none; background: linear-gradient(45deg, #00f7ff, #8a2be2); color: white; font-size: 18px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,247,255,0.5); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
    </style>
</head>
<body>

<canvas id="bg"></canvas>

<nav>
    <h1 style="cursor:pointer" onclick="goHome()">IOTIFY</h1>
    <button onclick="goHome()">Home</button>
</nav>

<section class="register-section">
    <div class="register-container">
        <h1 class="hero-title">Event Registration</h1>
        <form id="registrationForm">
            <div class="form-grid">
                <input type="text" name="teamName" placeholder="Enter Team Name" required class="full-width">
                <select name="theme" required>
                    <option value="" disabled selected>Competition Theme</option>
                    <option value="SUS">SUS</option>
                    <option value="ABC">ABC</option>
                    <option value="XYX">XYX</option>
                    <option value="Open Source">Open Source</option>
                </select>
                <select id="teamSize" name="teamSize" required onchange="generateMemberFields()">
                    <option value="" disabled selected>Select Team Size</option>
                    <option value="1">1 Member</option>
                    <option value="2">2 Members</option>
                    <option value="3">3 Members</option>
                    <option value="4">4 Members</option>
                    <option value="5">5 Members</option>
                </select>
            </div>
            <div id="membersContainer"></div>
            <button type="submit" id="submitBtn" class="submit-btn">Confirm Registration</button>
        </form>
    </div>
</section>

<script src="script.js"></script>
<script>
    const scriptURL = 'https://sheetdb.io/api/v1/fd866znaw2q5v'; 

    function generateMemberFields() {
        const size = document.getElementById('teamSize').value;
        const container = document.getElementById('membersContainer');
        container.innerHTML = ""; 
        for (let i = 1; i <= size; i++) {
            const role = (i === 1) ? "Team Leader" : `Member ${i}`;
            container.innerHTML += `
                <div class="member-section">
                    <h3>👤 ${role} Details</h3>
                    <div class="form-grid">
                        <input type="text" name="name_${i}" placeholder="Full Name" required>
                        <input type="text" name="usn_${i}" placeholder="USN" required>
                        <input type="tel" name="phone_${i}" placeholder="Phone Number" required>
                        <input type="email" name="email_${i}" placeholder="Email Address" required>
                        <input type="text" name="branch_${i}" placeholder="Branch" required>
                        <select name="sem_${i}" required>
                            <option value="" disabled selected>Semester</option>
                            <option value="2">2nd Sem</option><option value="4">4th Sem</option>
                            <option value="6">6th Sem</option><option value="8">8th Sem</option>
                        </select>
                    </div>
                </div>`;
        }
    }

    const form = document.getElementById('registrationForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "Processing...";

        const formData = new FormData(form);
        const data = {};
        formData.forEach((value, key) => { data[key] = value; });
        data['Timestamp'] = new Date().toLocaleString(); // Manual timestamp

        fetch(scriptURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: [data] }) // SheetDB structure
        })
        .then(res => res.json())
        .then(result => {
            alert("Registration Successful!");
            window.location.href = "index.html";
        })
        .catch(error => {
            console.error('Error!', error.message);
            alert("Submission failed. Please check your connection.");
            btn.disabled = false;
            btn.innerText = "Confirm Registration";
        });
    });

    function goHome() { window.location.href = "index.html"; }
</script>
</body>
</html>
