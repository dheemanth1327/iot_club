<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IOTIFY Admin Panel</title>

<link rel="stylesheet" href="style.css">

<!-- QR Library -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body>

<canvas id="bg"></canvas>

<nav>
    <h1>IOTIFY Admin</h1>
    <div>
        <button onclick="goHome()">Home</button>
        <button onclick="logout()">Logout</button>
    </div>
</nav>

<section class="section">

    <!-- 🔥 QR GENERATOR -->
    <h2 class="verify-title">Generate Certificate QR</h2>

    <div class="verify-box">

        <input type="text" id="qrName" placeholder="Enter Name">
        <input type="text" id="qrId" placeholder="Enter ID">

        <button onclick="generateQR()">Generate QR</button>

        <div id="qr-container" style="margin-top:20px;"></div>

        <input type="text" id="linkOutput" readonly style="margin-top:10px;">

        <button onclick="copyLink()">Copy Link</button>

    </div>

    <!-- 👤 MEMBER MANAGEMENT -->
    <h2 style="margin-top:50px;">Add Member</h2>

    <div class="verify-box">

        <input id="name" placeholder="Name">
        <input id="id" placeholder="ID">
        <input id="event" placeholder="Event">
        <input id="date" placeholder="Date">
        <input id="link" placeholder="Certificate Link">

        <button onclick="addMember()">Add Member</button>

    </div>

    <h2 style="margin-top:40px;">Members</h2>

    <div id="memberList"></div>

</section>

<script src="script.js"></script>

<script>
// ================= QR GENERATION =================
function generateQR(){

    const name = document.getElementById("qrName").value.trim();
    const id = document.getElementById("qrId").value.trim();

    if(!name || !id){
        alert("Enter all fields");
        return;
    }

    const encoded = btoa(name + "|" + id);

    const url = `result.html?data=${encoded}`;
    const fullLink = window.location.origin + "/" + url;

    document.getElementById("linkOutput").value = fullLink;

    const qrContainer = document.getElementById("qr-container");
    qrContainer.innerHTML = "";

    QRCode.toCanvas(document.createElement("canvas"), fullLink, function (err, canvas) {
        if(err) console.error(err);
        qrContainer.appendChild(canvas);
    });
}

// ================= COPY LINK =================
function copyLink(){
    const input = document.getElementById("linkOutput");
    input.select();
    document.execCommand("copy");
    alert("Link copied ✅");
}
</script>

</body>
</html>
