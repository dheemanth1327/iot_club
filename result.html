<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Certificate Result</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="bg"></canvas>

<nav>
    <h1>IOTIFY</h1>
    <button onclick="goHome()">Home</button>
</nav>

<section class="section">
    <h2 class="verify-title">Certificate Details</h2>
    <div class="result-box" id="resultBox"></div>
</section>

<script src="script.js"></script>

<script>
window.onload = async function(){

    const box = document.getElementById("resultBox");

    const params = new URLSearchParams(window.location.search);
    const encoded = params.get("data");

    // ❌ No data
    if(!encoded){
        box.innerHTML = `
        <div class="result-card fail">
            <h2>No QR Data Found</h2>
            <p>Please scan a valid QR code</p>
        </div>`;
        return;
    }

    let decoded;

    try{
        decoded = atob(encoded);
    }catch{
        showInvalid();
        return;
    }

    const [name,id] = decoded.split("|");

    const url = "https://opensheet.elk.sh/188kV2CseK37tFy5R1tUYm6AZjL9k1Y71i64Jqra1dFQ/Sheet1";

    try{
        const res = await fetch(url);
        const data = await res.json();

        const user = data.find(r =>
            String(r.Name || "").trim().toLowerCase() === name.trim().toLowerCase() &&
            String(r.ID || r["ID "] || "").trim().toLowerCase() === id.trim().toLowerCase()
        );

        if(!user){
            showInvalid();
            return;
        }

        renderResult(user);

    }catch{
        box.innerHTML = `
        <div class="result-card fail">
            <h2>Network Error</h2>
            <p>Unable to fetch data</p>
        </div>`;
    }
};

function renderResult(user){

    let certLink = user.Link;

    if(certLink.includes("drive")){
        certLink = certLink.replace("/view","/preview");
    }

    document.getElementById("resultBox").innerHTML = `
    <div class="result-card success">

        <span class="verified-badge">✔ VERIFIED</span>

        <h2>${user.Name}</h2>
        <p>ID: ${user.ID || user["ID "]}</p>

        <p><b>Event:</b> ${user.Event}</p>
        <p><b>Date:</b> ${user.Date}</p>

        <iframe src="${certLink}" width="100%" height="400"></iframe>

    </div>`;
}

function showInvalid(){
    document.getElementById("resultBox").innerHTML = `
    <div class="result-card fail">
        <h2>Invalid Certificate</h2>
        <p>Not found in database</p>
    </div>`;
}
</script>

</body>
</html>
