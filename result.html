<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Certificate Result</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="bg"></canvas>

<nav>
    <h1>IOTIFY</h1>
    <button onclick="goHome()">Home</button>
</nav>

<section class="section">

    <h2 class="verify-title">Certificate Details</h2>

    <div class="result-box" id="resultBox"></div>

</section>

<script src="script.js"></script>

<script>
window.onload = function(){

    const data = JSON.parse(localStorage.getItem("certData"));

    const box = document.getElementById("resultBox");

    if(!data){
        box.innerHTML = "<h3>❌ No Data Found</h3>";
        return;
    }

    let certLink = data.Link;

    if(certLink.includes("drive.google.com")){
        certLink = certLink.replace("/view","/preview");
    }

    box.innerHTML = `
    <div class="result-card success">

        <span class="verified-badge">✔ VERIFIED</span>

        <h2>${data.Name}</h2>
        <p>ID: ${data.ID || data["ID "]}</p>

        <div class="event-box">
            <p><strong>Event:</strong> ${data.Event}</p>
            <p><strong>Date:</strong> ${data.Date}</p>
        </div>

        <iframe src="${certLink}" width="100%" height="400"></iframe>

    </div>`;
};
</script>

</body>
</html>
