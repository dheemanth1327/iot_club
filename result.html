<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Certificate Result</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="bg"></canvas>

<nav>
    <h1>IOTIFY</h1>
    <button onclick="goHome()">Home</button>
</nav>

<section class="section">
    <h2 class="verify-title">Certificate Details</h2>
    <div class="result-box" id="resultBox"></div>
</section>

<script src="script.js"></script>

<script>
window.onload = async function(){

    const box = document.getElementById("resultBox");

    // ================= CHECK LOCAL DATA =================
    const localData = JSON.parse(localStorage.getItem("certData"));

    if(localData){

        // ❌ INVALID CASE
        if(localData.status === "invalid"){
            showInvalid();
            return;
        }

        // ✅ VALID CASE
        renderResult(localData);
        return;
    }

    // ================= QR FLOW =================
    const params = new URLSearchParams(window.location.search);
    const encoded = params.get("data");

    if(!encoded){
        showInvalid();
        return;
    }

    let decoded;

    try{
        decoded = atob(encoded);
    }catch{
        showInvalid();
        return;
    }

    const [name,id] = decoded.split("|");

    const url = "https://opensheet.elk.sh/188kV2CseK37tFy5R1tUYm6AZjL9k1Y71i64Jqra1dFQ/Sheet1";

    try{
        const res = await fetch(url);
        const data = await res.json();

        const user = data.find(r =>
            String(r.Name || "").toLowerCase() === name.toLowerCase() &&
            String(r.ID || r["ID "] || "").toLowerCase() === id.toLowerCase()
        );

        if(!user){
            showInvalid();
            return;
        }

        renderResult(user);

    }catch{
        showInvalid();
    }
};

// ================= VALID UI =================
function renderResult(user){

    let certLink = user.Link;

    if(certLink.includes("drive")){
        certLink = certLink.replace("/view","/preview");
    }

    document.getElementById("resultBox").innerHTML = `
    <div class="result-card success animate-in">

        <span class="verified-badge">✔ VERIFIED</span>

        <h2>${user.Name}</h2>
        <p>ID: ${user.ID || user["ID "]}</p>

        <div class="event-box">
            <p><strong>Event:</strong> ${user.Event}</p>
            <p><strong>Date:</strong> ${user.Date}</p>
        </div>

        <iframe src="${certLink}" width="100%" height="400"></iframe>

    </div>`;
}

// ================= INVALID UI =================
function showInvalid(){

    document.getElementById("resultBox").innerHTML = `
    <div class="result-card fail animate-fail">

        <span class="fail-badge">✖ NOT VERIFIED</span>

        <h2>Invalid Certificate</h2>

        <p>This certificate is not found in our database.</p>

        <div class="error-icon">⚠</div>

    </div>`;
}
</script>

</body>
</html>
