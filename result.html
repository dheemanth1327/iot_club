<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Certificate Result</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="bg"></canvas>

<nav>
    <h1>IOTIFY</h1>
    <button onclick="goHome()">Home</button>
</nav>

<section class="section">
    <h2 class="verify-title">Certificate Details</h2>
    <div class="result-box" id="resultBox"></div>
</section>

<script src="script.js"></script>

<script>
window.onload = async function(){

    const box = document.getElementById("resultBox");

    const params = new URLSearchParams(window.location.search);
    const encoded = params.get("data");

    if(!encoded){
        showInvalid();
        return;
    }

    let decoded;

    try{
        decoded = atob(encoded);
    }catch{
        showInvalid();
        return;
    }

    const [name,id] = decoded.split("|");

    const url = "https://opensheet.elk.sh/188kV2CseK37tFy5R1tUYm6AZjL9k1Y71i64Jqra1dFQ/Sheet1";

    try{
        const res = await fetch(url);
        const data = await res.json();

        const user = data.find(r =>
            String(r.Name || "").toLowerCase() === name.toLowerCase() &&
            String(r.ID || r["ID "] || "").toLowerCase() === id.toLowerCase()
        );

        if(!user){
            showInvalid();
            return;
        }

        renderResult(user);

    }catch{
        showInvalid();
    }
};
</script>

</body>
</html>
